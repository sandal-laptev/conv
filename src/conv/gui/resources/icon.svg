<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="iconFade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle decorative ring -->
  <circle cx="128" cy="128" r="105" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"/>

  <!-- ===== MEDIA CONVERTER ICON ===== -->

  <!-- 1. Play triangle (source media) -->
  <polygon points="68,95 68,161 115,128" fill="url(#iconFade)" opacity="0.9"/>

  <!-- 2. Conversion arrow -->
  <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <!-- horizontal arrow shaft -->
    <line x1="130" y1="128" x2="185" y2="128"/>
    <!-- arrowhead -->
    <polyline points="175,115 188,128 175,141" fill="url(#accent)" stroke="none" opacity="0.9"/>
  </g>

  <!-- 3. File/document (output) -->
  <g transform="translate(188, 88)" opacity="0.9">
    <!-- document body -->
    <path d="M 8 0 L 32 0 L 44 12 L 44 72 Q 44 80 36 80 L 8 80 Q 0 80 0 72 L 0 8 Q 0 0 8 0 Z" fill="none" stroke="url(#iconFade)" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- document lines (content) -->
    <line x1="10" y1="24" x2="34" y2="24" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="10" y1="36" x2="34" y2="36" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="10" y1="48" x2="28" y2="48" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <!-- play icon on the document -->
    <polygon points="20,56 20,66 27,61" fill="url(#iconFade)" opacity="0.8"/>
  </g>

  <!-- MO Kolomyagi branding -->
  <text x="128" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="url(#accent)" opacity="0.6" letter-spacing="3">MO</text>

</svg>
