<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Network lines -->
  <g stroke="url(#accent)" stroke-width="2" opacity="0.4">
    <line x1="75" y1="75" x2="128" y2="128"/>
    <line x1="181" y1="75" x2="128" y2="128"/>
    <line x1="75" y1="181" x2="128" y2="128"/>
    <line x1="181" y1="181" x2="128" y2="128"/>
    <line x1="128" y1="55" x2="128" y2="128"/>
    <line x1="128" y1="201" x2="128" y2="128"/>
    <line x1="55" y1="128" x2="128" y2="128"/>
    <line x1="201" y1="128" x2="128" y2="128"/>
  </g>

  <!-- Nodes -->
  <g fill="#00d4ff" opacity="0.5">
    <circle cx="75" cy="75" r="4"/>
    <circle cx="181" cy="75" r="4"/>
    <circle cx="75" cy="181" r="4"/>
    <circle cx="181" cy="181" r="4"/>
    <circle cx="128" cy="55" r="3"/>
    <circle cx="128" cy="201" r="3"/>
    <circle cx="55" cy="128" r="3"/>
    <circle cx="201" cy="128" r="3"/>
  </g>

  <!-- Inner circle (face) -->
  <circle cx="128" cy="125" r="44" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Eyes -->
  <g filter="url(#glow)">
    <ellipse cx="113" cy="115" rx="5" ry="6" fill="#00d4ff"/>
    <ellipse cx="143" cy="115" rx="5" ry="6" fill="#00d4ff"/>
    <circle cx="113" cy="115" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="143" cy="115" r="2" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Smile -->
  <path d="M 112 132 Q 128 145 144 132" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- MO text -->
  <text x="128" y="175" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7b2ff7" opacity="0.8" filter="url(#glow)">MO</text>
</svg>
